<!DOCTYPE html>
<html lang="en-GB">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>GAIN Account Pack | Meridian Technology Group</title>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;800;900&family=JetBrains+Mono:wght@400;500;700&display=swap" rel="stylesheet">
    <style>
        *,*::before,*::after{box-sizing:border-box;margin:0;padding:0}
        :root{--bg:#030712;--surface:#0d1117;--s2:rgba(17,24,39,0.6);--border:#1f2937;--b2:#374151;--text:#f3f4f6;--muted:#9ca3af;--dim:#6b7280;--faint:#4b5563;--green:#10b981;--amber:#f59e0b;--orange:#f97316;--red:#ef4444;--blue:#3b82f6;--purple:#a855f7;--cyan:#06b6d4;--pink:#ec4899}
        body{background:var(--bg);color:var(--text);font-family:'Inter',system-ui,sans-serif;-webkit-font-smoothing:antialiased;line-height:1.5;font-size:14px}
        ::selection{background:var(--blue);color:white}
        .mono{font-family:'JetBrains Mono',monospace}
        .label{font-size:9px;font-weight:700;letter-spacing:0.15em;text-transform:uppercase}

        .header{background:linear-gradient(180deg,#0f172a 0%,var(--bg) 100%);border-bottom:1px solid var(--border);padding:32px 24px 24px}
        .header-inner{max-width:1200px;margin:0 auto}
        .header h1{font-size:clamp(20px,3vw,28px);font-weight:900;letter-spacing:-0.02em;color:white}
        .meta-row{display:flex;gap:8px;flex-wrap:wrap;margin-top:8px}
        .meta-pill{font-size:11px;padding:4px 10px;border-radius:6px;border:1px solid var(--border);background:var(--s2);color:var(--muted)}

        .main{max-width:1200px;margin:0 auto;padding:24px}

        /* NAV TABS */
        .card-nav{display:flex;gap:4px;margin-bottom:20px;flex-wrap:wrap;position:sticky;top:0;background:var(--bg);padding:8px 0;z-index:10}
        .nav-btn{font-size:11px;font-weight:600;padding:7px 14px;border-radius:7px;border:1px solid var(--border);background:var(--surface);color:var(--faint);cursor:pointer;transition:all 0.2s;font-family:inherit}
        .nav-btn:hover{border-color:var(--b2);color:var(--muted)}
        .nav-btn.active{border-color:var(--blue);color:var(--blue);background:rgba(59,130,246,0.06)}

        /* DASHBOARD CARDS */
        .dash-card{display:none;animation:fadeIn 0.25s ease-out}
        .dash-card.active{display:block}
        @keyframes fadeIn{from{opacity:0;transform:translateY(4px)}to{opacity:1;transform:translateY(0)}}

        .card-header{display:flex;justify-content:space-between;align-items:flex-start;margin-bottom:16px;flex-wrap:wrap;gap:8px}
        .card-source{font-size:10px;color:var(--dim);padding:3px 8px;border:1px solid var(--border);border-radius:4px}
        .card-updated{font-size:10px;color:var(--faint)}

        .card{background:var(--surface);border:1px solid var(--border);border-radius:10px;padding:16px;margin-bottom:10px}
        .card-title{font-size:9px;font-weight:700;letter-spacing:0.12em;text-transform:uppercase;margin-bottom:10px}

        /* KPI STRIP */
        .kpi-strip{display:grid;grid-template-columns:repeat(auto-fit,minmax(120px,1fr));gap:8px;margin-bottom:16px}
        .kpi{background:var(--surface);border:1px solid var(--border);border-radius:8px;padding:12px;text-align:center}
        .kpi-val{font-size:22px;font-weight:900;color:white;line-height:1;margin:4px 0}
        .kpi-lbl{font-size:9px;font-weight:700;color:var(--dim);letter-spacing:0.08em;text-transform:uppercase}

        /* TWO COL */
        .two-col{display:grid;grid-template-columns:1fr 1fr;gap:10px}
        @media(max-width:700px){.two-col{grid-template-columns:1fr}}
        .three-col{display:grid;grid-template-columns:1fr 1fr 1fr;gap:10px}
        @media(max-width:700px){.three-col{grid-template-columns:1fr}}

        /* DATA ROW */
        .data-row{display:flex;justify-content:space-between;align-items:center;padding:6px 0;border-bottom:1px solid rgba(31,41,55,0.4);font-size:12px}
        .data-row:last-child{border-bottom:none}
        .data-label{color:var(--muted)}
        .data-val{font-weight:600;color:white}

        /* RAG DOT */
        .rag{width:8px;height:8px;border-radius:50%;display:inline-block;margin-right:6px;flex-shrink:0}

        /* PERSON CARD */
        .person{display:flex;gap:12px;padding:12px;border:1px solid var(--border);border-radius:8px;background:rgba(17,24,39,0.3);margin-bottom:8px}
        .person-avatar{width:40px;height:40px;border-radius:50%;background:var(--border);display:flex;align-items:center;justify-content:center;font-size:14px;font-weight:700;color:var(--dim);flex-shrink:0}
        .person-name{font-size:13px;font-weight:700;color:white}
        .person-role{font-size:11px;color:var(--dim)}
        .person-detail{font-size:11px;color:var(--muted);margin-top:4px;line-height:1.5}

        /* SIGNAL */
        .signal-row{display:flex;align-items:center;gap:8px;padding:8px 0;border-bottom:1px solid rgba(31,41,55,0.3);font-size:12px}
        .signal-row:last-child{border-bottom:none}
        .signal-name{flex:1;color:var(--muted)}
        .signal-val{color:white;font-weight:600}

        /* DEAL ROW */
        .deal-row-card{padding:12px;border:1px solid var(--border);border-radius:8px;margin-bottom:8px;border-left:3px solid;background:rgba(17,24,39,0.3)}
        .deal-top{display:flex;justify-content:space-between;align-items:flex-start}
        .deal-name{font-size:13px;font-weight:700;color:white}
        .deal-val{font-size:14px;font-weight:800;color:white}
        .deal-meta{font-size:11px;color:var(--dim);margin-top:4px}
        .deal-flags{display:flex;gap:4px;flex-wrap:wrap;margin-top:6px}
        .deal-flag{font-size:9px;font-weight:600;padding:2px 6px;border-radius:3px}

        /* PROMPT CHAIN */
        .prompt-chain{display:flex;gap:6px;flex-wrap:wrap}
        .prompt-tag{font-size:10px;padding:3px 8px;border-radius:4px;font-weight:600;cursor:pointer;transition:all 0.2s}
        .prompt-tag:hover{opacity:0.8}
        .prompt-tag.gather{background:rgba(59,130,246,0.1);border:1px solid rgba(59,130,246,0.2);color:var(--blue)}
        .prompt-tag.assess{background:rgba(168,85,247,0.1);border:1px solid rgba(168,85,247,0.2);color:var(--purple)}
        .prompt-tag.influence{background:rgba(236,72,153,0.1);border:1px solid rgba(236,72,153,0.2);color:var(--pink)}
        .prompt-tag.nurture{background:rgba(16,185,129,0.1);border:1px solid rgba(16,185,129,0.2);color:var(--green)}

        /* TIMELINE */
        .tl{position:relative;padding-left:20px}
        .tl::before{content:'';position:absolute;left:5px;top:4px;bottom:4px;width:2px;background:var(--border)}
        .tl-item{position:relative;margin-bottom:12px;padding-left:16px}
        .tl-dot{position:absolute;left:-18px;top:4px;width:10px;height:10px;border-radius:50%;border:2px solid}

        .footer{text-align:center;padding:24px;border-top:1px solid var(--border);margin-top:32px}
        .footer p{font-size:10px;color:var(--faint)}
    </style>
</head>
<body>

<div class="header">
    <div class="header-inner">
        <p class="label" style="color:var(--cyan);margin-bottom:8px">GAIN ACCOUNT PACK</p>
        <h1 id="companyTitle">Meridian Technology Group</h1>

            <span class="meta-pill">PE-Backed VAR/MSP</span>
            <span class="meta-pill">&pound;42M Revenue</span>

            <span class="meta-pill" style="border-color:var(--orange);color:var(--orange)">Verdict: FIX</span>
        </div>
    </div>
</div>

<div class="main">
    <div class="card-nav" id="cardNav"></div>
    <div id="cardContent"></div>
    <div class="footer"><p>GAIN Account Pack &middot; Meridian Technology Group &middot; David Matthews &middot; Confidential</p></div>
</div>
