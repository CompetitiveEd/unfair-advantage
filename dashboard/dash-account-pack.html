const ScoreBar = ({ score, max=5 }) => {
  const pct = (score/max)*100;
  const color = score >= 4 ? "bg-emerald-500" : score >= 3 ? "bg-amber-400" : "bg-red-500";
  return <div className="flex items-center gap-2"><div className="w-20 h-2 bg-gray-800 rounded-full overflow-hidden"><div className={`h-full rounded-full ${color}`} style={{width:`${pct}%`}}/></div><span className="text-xs font-bold text-white">{score}</span></div>;
};

  return (
    <div className="mb-4 border border-gray-800 rounded-lg overflow-hidden">
      <button onClick={() => setOpen(!open)} className="w-full flex items-center justify-between px-5 py-4 bg-gray-900/80 hover:bg-gray-900 transition-colors text-left">
        <div>
          <span className="text-[10px] font-bold text-blue-400 uppercase tracking-widest block">{id}</span>
          <span className="text-base font-extrabold text-white">{title}</span>

      </button>
      {open && <div className="p-5 bg-gray-950/50 border-t border-gray-800">{children}</div>}
    </div>
  );
};

// ══════════════════════════════════════════════════════════════════════
// MAIN DASHBOARD
// ══════════════════════════════════════════════════════════════════════

function MeridianDashboard() {
  const [activeTab, setActiveTab] = useState("summary");
  const [selectedPerson, setSelectedPerson] = useState(null);

  const tabs = [
    { id:"summary", label:"Account Summary", desc:"5-min steering view" },
    { id:"stakeholders", label:"Stakeholders", desc:"8 profiles · GAIN · Kegan" },
    { id:"strategy", label:"Win Strategy", desc:"Themes · scoring · compete" },
    { id:"risks", label:"Risks & Timeline", desc:"Pre-mortem · events" },
    { id:"growth", label:"Post-Win Growth", desc:"Expansion · defence" },
  ];

  return (
    <div className="min-h-screen bg-gray-950 text-gray-200" style={{fontFamily:"'Segoe UI',system-ui,sans-serif"}}>
      {/* HEADER */}
      <div className="border-b border-gray-800 bg-gray-900/50 px-6 py-4">
        <div className="max-w-7xl mx-auto flex flex-col sm:flex-row justify-between items-start sm:items-center gap-3">
          <div>
            <div className="flex items-center gap-3 mb-1">
              <span className="text-[10px] font-bold text-emerald-400 uppercase tracking-widest font-mono">GAIN Full Account Plan</span>
              <span className="inline-flex items-center gap-1.5 px-2 py-0.5 bg-red-950/40 border border-red-600/30 rounded text-[10px] font-bold text-red-300 uppercase tracking-wider">
                <span className="w-1.5 h-1.5 bg-red-500 rounded-full animate-pulse"/>{ACCOUNT.status}
              </span>
            </div>
            <h1 className="text-2xl font-black text-white tracking-tight">{ACCOUNT.name}</h1>
            <p className="text-xs text-gray-500 mt-0.5">Seller: {ACCOUNT.seller} · {ACCOUNT.sector} · {ACCOUNT.term} · TCV: {ACCOUNT.dealValue}</p>
          </div>
          <div className="flex items-center gap-4">
            <button onClick={downloadPDF} className="px-4 py-2 bg-blue-600 hover:bg-blue-500 text-white text-xs font-bold rounded-lg transition-colors flex items-center gap-2">
              <span>↓</span> Download Full Plan (PDF)
            </button>
            <div className="text-right">
              <div className="text-[10px] text-gray-500 uppercase tracking-widest font-bold">Win Prob</div>
              <div className="text-3xl font-black text-white">{ACCOUNT.winProbability}%</div>
            </div>
            <div className="w-14 h-14"><svg viewBox="0 0 36 36" className="w-14 h-14 transform -rotate-90"><circle cx="18" cy="18" r="15" fill="none" stroke="#1e293b" strokeWidth="3"/><circle cx="18" cy="18" r="15" fill="none" stroke="#10b981" strokeWidth="3" strokeDasharray={`${ACCOUNT.winProbability*0.942} 94.25`} strokeLinecap="round"/></svg></div>
          </div>
        </div>
      </div>

      {/* TABS */}
      <div className="border-b border-gray-800 bg-gray-900/30 px-6 overflow-x-auto">
        <div className="max-w-7xl mx-auto flex gap-0">
          {tabs.map(t => (
            <button key={t.id} onClick={() => setActiveTab(t.id)}
              className={`px-5 py-3 text-left border-b-2 transition-all shrink-0 ${activeTab===t.id?"border-blue-500 bg-blue-950/20":"border-transparent hover:bg-gray-900/50"}`}>
              <span className={`text-xs font-bold block ${activeTab===t.id?"text-blue-400":"text-gray-500"}`}>{t.label}</span>
              <span className="text-[10px] text-gray-600">{t.desc}</span>
            </button>
          ))}
        </div>
      </div>

      {/* CONTENT */}
      <div className="max-w-7xl mx-auto px-6 py-6">

        {/* ═══════ ACCOUNT SUMMARY ═══════ */}
        {activeTab === "summary" && (<div>
          <Section id="MACRO" title="Company Macro" subtitle={`${MACRO.revenue} revenue · ${MACRO.employees} employees · ${MACRO.customers} customers`} defaultOpen={true}>
            <div className="grid grid-cols-2 md:grid-cols-4 gap-3 mb-4">
              <KPI label="Revenue" value={MACRO.revenue} sub={MACRO.revenueGrowth} color="text-white"/>
              <KPI label="Op. Profit" value={MACRO.opProfit} sub={`ROE ${MACRO.roe}`} color="text-white"/>
              <KPI label="IT Budget" value={MACRO.itBudget} sub="Annual I&O spend" color="text-blue-400"/>
              <KPI label="Market Cap" value={MACRO.marketCap} sub={`Solvency II: ${MACRO.solvency}`} color="text-white"/>
            </div>
            <h4 className="text-xs font-bold text-red-400 uppercase tracking-widest mb-2 mt-4">Bleeding Necks</h4>
            <div className="grid grid-cols-2 md:grid-cols-4 gap-3 mb-4">
              {[{l:"Servers EOL",v:MACRO.serverEOL},{l:"Outage Cost/yr",v:MACRO.outageCost},{l:"FCR",v:MACRO.fcr},{l:"Alert Noise",v:MACRO.alertNoise}].map((s,i)=>(
                <div key={i} className="bg-red-950/10 border border-red-800/30 rounded p-3">
                  <div className="text-[10px] text-gray-500 uppercase font-bold">{s.l}</div>
                  <div className="text-sm font-bold text-red-400">{s.v}</div>
                </div>
              ))}
            </div>
            <div className="bg-gray-900 border border-gray-800 rounded-lg p-4 mt-3">
              <h4 className="text-xs font-bold text-amber-400 uppercase tracking-widest mb-2">The Narrative Gap</h4>
              <p className="text-sm text-gray-300">CEO says <span className="text-white font-bold">"availability, not assets"</span> — the infrastructure delivers <span className="text-red-400 font-bold">unavailability caused by neglected assets</span>. Meridian 2030 is a rescue mission reframed as strategic vision. Both framings are true simultaneously.</p>
            </div>
          </Section>

          <Section id="LEAKS" title="Financial Leaks" subtitle="£33-37M 7-year cost of inaction">
            <div className="overflow-x-auto">
              <table className="w-full text-xs">
                <thead><tr className="border-b border-gray-800">
                  <th className="text-left py-2 text-gray-500 font-bold uppercase">Leak</th>
                  <th className="text-center py-2 text-gray-500 font-bold uppercase">Annual Cost</th>
                  <th className="text-center py-2 text-gray-500 font-bold uppercase">7-Year</th>
                  <th className="text-center py-2 text-gray-500 font-bold uppercase">Confidence</th>
                  <th className="text-center py-2 text-gray-500 font-bold uppercase">Owner</th>
                </tr></thead>
                <tbody>{LEAKS.map((l,i) => (
                  <tr key={i} className="border-b border-gray-800/30">
                    <td className="py-2 text-white font-semibold">{l.name}</td>
                    <td className="py-2 text-center text-red-400 font-bold">{l.annual}</td>
                    <td className="py-2 text-center text-amber-300">{l.sevenYr}</td>
                    <td className="py-2 text-center"><Badge color={l.conf==="HIGH"?"green":l.conf.includes("MED-H")?"blue":"amber"}>{l.conf}</Badge></td>
                    <td className="py-2 text-center text-gray-400">{l.owner}</td>
                  </tr>
                ))}</tbody>
              </table>
            </div>
            <div className="mt-3 p-3 bg-red-950/20 border border-red-800/30 rounded text-sm text-center">
              <span className="text-red-300 font-bold">21-23% of the £16.5M IT budget funds failure, not service. One pound in every five.</span>
            </div>
          </Section>

          <Section id="ACTIONS" title="Critical Actions Before Submission" subtitle={`${CRITICAL_ACTIONS.filter(a=>a.status==="NOT STARTED").length} not started`}>
            <div className="space-y-2">
              {CRITICAL_ACTIONS.map((a,i) => (
                <div key={i} className="flex items-start gap-3 p-3 bg-gray-900/50 border border-gray-800 rounded">
                  <span className={`mt-0.5 shrink-0 text-sm ${a.status==="NOT STARTED"?"text-red-500":"text-amber-400"}`}>{a.status==="NOT STARTED"?"✕":"◐"}</span>
                  <div className="flex-1">
                    <div className="text-sm font-bold text-white">{a.action}</div>
                    <div className="text-[11px] text-gray-500">{a.impact}</div>
                  </div>
                  <Badge color={a.status==="NOT STARTED"?"red":"amber"}>{a.status}</Badge>
                </div>
              ))}
            </div>
          </Section>

          <Section id="TRAUMA" title="RFP Trauma Signals" subtitle="7 scars decoded from RFP language">
            <div className="space-y-2">
              {TRAUMA_SIGNALS.map((t,i) => (
                <div key={i} className="flex items-start gap-3 p-3 bg-gray-900/50 border border-gray-800 rounded">
                  <div className="flex gap-0.5 mt-1 shrink-0">{Array.from({length:t.weight}).map((_,j)=><span key={j} className="w-1.5 h-1.5 rounded-full bg-red-500"/>)}</div>
                  <div className="flex-1">
                    <div className="text-sm font-semibold text-white italic">{t.signal}</div>
                    <div className="text-xs text-gray-400">{t.pain}</div>
                  </div>
                  <span className="text-[11px] text-gray-500 shrink-0">{t.who}</span>
                </div>
              ))}
            </div>
          </Section>
        </div>)}

        {/* ═══════ STAKEHOLDERS ═══════ */}
        {activeTab === "stakeholders" && (<div>
          <Section id="PEOPLE" title="Stakeholder Intelligence" subtitle="8 profiles · Full G-03 psychological teardown" defaultOpen={true}>
            <div className="flex flex-wrap gap-2 mb-4">
              {STAKEHOLDERS.map(s => (
                <button key={s.id} onClick={() => setSelectedPerson(selectedPerson===s.id?null:s.id)}
                  className={`border rounded-lg px-3 py-2 text-center transition-all cursor-pointer ${
                    selectedPerson===s.id?"bg-blue-950/40 border-blue-500":
                    s.status==="champion"?"bg-emerald-950/20 border-emerald-600/40":
                    s.status==="veto_holder"?"bg-red-950/20 border-red-600/40":
                    "bg-gray-900 border-gray-800 hover:border-gray-600"
                  }`}>
                  <div className="flex items-center gap-1.5">
                    <StatusDot status={s.status}/>
                    <span className="text-xs font-bold text-white">{s.name.split(" ")[1]}</span>
                    <span className="text-[9px] text-gray-500 uppercase">{s.role}</span>
                    {s.status==="champion" && <Badge color="green">★</Badge>}
                    {s.status==="veto_holder" && <Badge color="red">VETO</Badge>}
                  </div>
                </button>
              ))}
            </div>
            {selectedPerson && (() => {
              const p = STAKEHOLDERS.find(s=>s.id===selectedPerson);
              if(!p) return null;
              return (
                <div className="bg-gray-900 border border-blue-800/40 rounded-lg p-4">
                  <div className="flex flex-wrap items-center gap-2 mb-3">
                    <StatusDot status={p.status}/>
                    <span className="text-base font-bold text-white">{p.name}</span>
                    <span className="text-xs text-gray-500">{p.role}</span>
                    <Badge color={p.status==="champion"?"green":p.status==="veto_holder"?"red":p.status==="primary"?"blue":"gray"}>{p.status.replace("_"," ")}</Badge>
                    <Badge color="purple">{p.gain}</Badge>
                    <Badge color="blue">{p.vak}</Badge>
                    <Badge color="gray">{p.awareness}</Badge>
                  </div>
                  <p className="text-sm text-gray-300 leading-relaxed mb-3">{p.summary}</p>
                  <div className="grid grid-cols-1 md:grid-cols-3 gap-2 mb-3">
                    <div className="bg-gray-950/50 border border-gray-800 rounded p-3">
                      <div className="text-[10px] text-emerald-400 uppercase font-bold mb-1">Triggers</div>
                      <div className="text-xs text-gray-300">{p.trigger}</div>
                    </div>
                    <div className="bg-gray-950/50 border border-gray-800 rounded p-3">
                      <div className="text-[10px] text-red-400 uppercase font-bold mb-1">Avoid</div>
                      <div className="text-xs text-gray-300">{p.avoid}</div>
                    </div>
                    <div className="bg-gray-950/50 border border-gray-800 rounded p-3">
                      <div className="text-[10px] text-amber-400 uppercase font-bold mb-1">Kegan Immunity</div>
                      <div className="text-xs text-gray-300">{p.kegan}</div>
                    </div>
                  </div>
                  <div className="flex gap-4 text-[11px] font-mono text-gray-500">
                    <span>Authority: {p.authority}/100</span>
                    <span>Influence: {p.influence}/100</span>
                  </div>
                </div>
              );
            })()}
            <div className="flex items-center gap-3 mt-3 text-[9px] font-mono text-gray-600">
              <span className="flex items-center gap-1"><StatusDot status="champion"/> Champion</span>
              <span className="flex items-center gap-1"><StatusDot status="primary"/> Primary</span>
              <span className="flex items-center gap-1"><StatusDot status="veto_holder"/> Veto Holder</span>
              <span className="flex items-center gap-1"><StatusDot status="kingmaker"/> Kingmaker</span>
              <span className="flex items-center gap-1"><StatusDot status="final_authority"/> Final Authority</span>
              <span className="flex items-center gap-1"><StatusDot status="process_gate"/> Process Gate</span>
            </div>
          </Section>

          <Section id="INFLUENCE" title="Decision Architecture" subtitle="Two-channel evaluation">
            <div className="grid grid-cols-1 md:grid-cols-2 gap-4">
              <div className="bg-gray-900 border border-blue-800/30 rounded-lg p-4">
                <h4 className="text-xs font-bold text-blue-400 uppercase tracking-widest mb-3">Channel 1 — Formal Evaluation</h4>
                <div className="space-y-2 text-sm text-gray-300">
                  <div><span className="text-white font-bold">Technical (60%):</span> Hale leads. Jennifer owns TC-04. Harrison validates TUPE. Chen feeds Hale informally.</div>
                  <div><span className="text-white font-bold">Commercial (30%):</span> Thompson designs and leads. Blackwell administers. Independent panel.</div>
                  <div><span className="text-white font-bold">Oral (10%):</span> All stakeholders. Live scenario (48hrs). 15-min informal = System 1 tiebreaker.</div>
                </div>
              </div>
              <div className="bg-gray-900 border border-red-800/30 rounded-lg p-4">
                <h4 className="text-xs font-bold text-red-400 uppercase tracking-widest mb-3">Channel 2 — Risk Governance Overlay</h4>
                <div className="space-y-2 text-sm text-gray-300">
                  <div><span className="text-white font-bold">Osei's vendor risk assessment:</span> Pass/fail gate. Not scored but can veto at Board.</div>
                  <div><span className="text-white font-bold">Kill phrase:</span> <span className="text-red-400 italic">"Checkbox compliance characteristics"</span></div>
                  <div className="text-amber-300 font-bold text-xs mt-2">You can win Channel 1 and lose Channel 2. The deal dies.</div>
                </div>
              </div>
            </div>
          </Section>
        </div>)}

        {/* ═══════ WIN STRATEGY ═══════ */}
        {activeTab === "strategy" && (<div>
          <Section id="THEMES" title="Win Themes" subtitle="5 themes from I-02 architect" defaultOpen={true}>
            <div className="space-y-2">
              {WIN_THEMES.map(t => (
                <div key={t.id} className={`flex items-center gap-3 p-4 rounded-lg border ${
                  t.strength==="fortress"?"bg-emerald-950/10 border-emerald-800/30":t.strength==="critical"?"bg-red-950/10 border-red-800/30":"bg-blue-950/10 border-blue-800/30"
                }`}>
                  <span className="text-lg font-black text-gray-600">#{t.id}</span>
                  <div className="flex-1">
                    <div className="text-sm font-bold text-white">{t.label}</div>
                    <div className="text-[11px] text-gray-400">{t.sub}</div>
                  </div>
                  <Badge color={t.strength==="fortress"?"green":t.strength==="critical"?"red":"blue"}>{t.strength}</Badge>
                </div>
              ))}
            </div>
            <div className="mt-4 bg-gray-900 border border-gray-800 rounded-lg p-4">
              <h4 className="text-xs font-bold text-blue-400 uppercase tracking-widest mb-2">The 30-Second Pitch</h4>
              <p className="text-sm text-gray-300 italic">"Meridian is spending one pound in every five of its IT budget on failure. That's £3.4M a year funding problems, not service. Your CEO says 'availability, not assets' — but 62% of your server estate is end-of-life. We don't see a managed services deal. We see a resilience transformation where the commercial model pays for itself from waste you're already spending."</p>
            </div>
          </Section>

          <Section id="SCORING" title="Competitive Scoring Position" subtitle={`Helios ${SCORING.helios} vs Fortis ${SCORING.fortis} vs Saraswati ${SCORING.saraswati}`}>
            <div className="flex flex-wrap items-baseline gap-6 mb-4">
              {[{n:"Helios (Us)",s:SCORING.helios,c:"text-emerald-400"},{n:"Fortis",s:SCORING.fortis,c:"text-red-400"},{n:"Saraswati",s:SCORING.saraswati,c:"text-amber-400"}].map((x,i)=>(
                <div key={i} className="flex items-baseline gap-2"><span className={`text-2xl font-black ${x.c}`}>{x.s.toFixed(2)}</span><span className="text-[10px] text-gray-500 uppercase font-bold">{x.n}</span></div>
              ))}
            </div>
            <div className="overflow-x-auto">
              <table className="w-full text-xs">
                <thead><tr className="border-b border-gray-800">
                  <th className="text-left py-2 text-gray-500 font-bold uppercase">Criterion</th>
                  <th className="text-center py-2 text-gray-500 font-bold uppercase w-16">Wt%</th>
                  <th className="text-center py-2 text-emerald-500 font-bold uppercase">Helios</th>
                  <th className="text-center py-2 text-red-400 font-bold uppercase">Fortis</th>
                  <th className="text-center py-2 text-amber-400 font-bold uppercase">Saraswati</th>
                  <th className="text-center py-2 text-gray-500 font-bold uppercase">Strategy</th>
                </tr></thead>
                <tbody>{SCORING.criteria.map(c => (
                  <tr key={c.code} className="border-b border-gray-800/30">
                    <td className="py-2"><span className="text-gray-500 font-mono mr-2">{c.code}</span><span className="text-white font-semibold">{c.label}</span></td>
                    <td className="py-2 text-center text-white font-bold">{c.weight}%</td>
                    <td className="py-2 text-center"><ScoreBar score={c.helios}/></td>
                    <td className="py-2 text-center"><ScoreBar score={c.fortis}/></td>
                    <td className="py-2 text-center"><ScoreBar score={c.saraswati}/></td>
                    <td className="py-2 text-center"><Badge color={c.strategy==="LOCK"?"green":c.strategy==="PUSH"?"blue":c.strategy==="CRITICAL"?"red":"amber"}>{c.strategy}</Badge></td>
                  </tr>
                ))}</tbody>
              </table>
            </div>
          </Section>

          <Section id="COMPETE" title="Competitor Intelligence" subtitle="3 competitors profiled from I-03">
            <div className="space-y-3">
              {COMPETITORS.map((c,i) => (
                <div key={i} className="bg-gray-900/60 border border-gray-800 rounded-lg p-4">
                  <div className="flex items-center gap-3 mb-2">
                    <Badge color={c.danger==="HIGH"?"red":c.danger==="MEDIUM"?"amber":"green"}>{c.danger}</Badge>
                    <span className="text-sm font-bold text-white">{c.name}</span>
                    <span className="text-[11px] text-gray-500">{c.revenue} · {c.model}</span>
                  </div>
                  <div className="grid grid-cols-1 md:grid-cols-3 gap-2 text-xs">
                    <div className="bg-gray-950/50 border border-gray-800 rounded p-2">
                      <div className="text-[10px] text-red-400 uppercase font-bold mb-1">Dangerous With</div>
                      <div className="text-gray-300">{c.dangerWith}</div>
                    </div>
                    <div className="bg-gray-950/50 border border-gray-800 rounded p-2">
                      <div className="text-[10px] text-emerald-400 uppercase font-bold mb-1">Their Weakness</div>
                      <div className="text-gray-300">{c.weakness}</div>
                    </div>
                    <div className="bg-gray-950/50 border border-gray-800 rounded p-2">
                      <div className="text-[10px] text-blue-400 uppercase font-bold mb-1">Kill Question</div>
                      <div className="text-gray-300 italic">"{c.kill}"</div>
                    </div>
                  </div>
                </div>
              ))}
            </div>
          </Section>
        </div>)}

        {/* ═══════ RISKS & TIMELINE ═══════ */}
        {activeTab === "risks" && (<div>
          <Section id="PREMORTEM" title="Pre-Mortem: How We Lose" subtitle="5 failure scenarios from I-01" defaultOpen={true}>
            <div className="space-y-2">
              {FAILURES.map(f => (
                <div key={f.id} className="flex items-start gap-3 p-3 bg-gray-900/50 border border-gray-800 rounded">
                  <span className="text-xs font-bold text-gray-500 w-8 shrink-0 mt-0.5">#{f.id}</span>
                  <div className="flex-1">
                    <div className="flex items-center gap-2 mb-1">
                      <span className="text-sm font-bold text-white">{f.label}</span>
                      <Badge color={f.prob>=25?"red":"amber"}>{f.prob}%</Badge>
                    </div>
                    <div className="text-[11px] text-gray-400">{f.trigger}</div>
                  </div>
                </div>
              ))}
            </div>
          </Section>

          <Section id="TIMELINE" title="Compelled Events Timeline" subtitle="RFP through Year 5 break clause">
            <div className="space-y-2">
              {TIMELINE.map((m,i) => (
                <div key={i} className="flex items-center gap-3 p-2">
                  <div className={`w-2.5 h-2.5 rounded-full shrink-0 ${m.done?"bg-emerald-500":m.active?"bg-blue-500 animate-pulse":m.hard?"bg-red-500":"bg-gray-600"}`}/>
                  <span className={`text-sm flex-1 ${m.done?"text-gray-500":m.active?"text-blue-300 font-bold":"text-white"}`}>{m.phase}</span>
                  <span className={`text-xs ${m.hard?"text-red-400 font-bold":"text-gray-500"}`}>{m.date}</span>
                  {m.hard && <Badge color="red">Hard Deadline</Badge>}
                  {m.active && <Badge color="blue">Now</Badge>}
                  {m.done && <Badge color="gray">Done</Badge>}
                </div>
              ))}
            </div>
          </Section>
        </div>)}

        {/* ═══════ POST-WIN GROWTH ═══════ */}
        {activeTab === "growth" && (<div>
          <Section id="EXPANSION" title="Expansion Signal Scan" subtitle="Post-win growth from N-01" defaultOpen={true}>
            <div className="mb-4 p-3 bg-emerald-950/20 border border-emerald-800/30 rounded text-sm text-emerald-300">
              Total expansion potential: Annual run rate £13-16M → £18-25M. Realistic 60% conversion = 20-40% account growth.
            </div>
            <div className="space-y-2">
              {EXPANSION.map((e,i) => (
                <div key={i} className="flex items-center gap-3 p-3 bg-gray-900/50 border border-gray-800 rounded">
                  <span className={`w-2.5 h-2.5 rounded-full shrink-0 ${e.gate==="green"?"bg-emerald-500":e.gate==="amber"?"bg-amber-400":"bg-gray-600"}`}/>
                  <div className="flex-1">
                    <span className="text-sm font-bold text-white">{e.signal}</span>
                    <div className="text-[11px] text-gray-500">Champion: {e.champion} · {e.timing}</div>
                  </div>
                  <span className="text-xs font-bold text-emerald-400">{e.revenue}</span>
                </div>
              ))}
            </div>
          </Section>

          <Section id="DEFENCE" title="Competitive Defence" subtitle="Block Fortis encroachment">
            <div className="bg-red-950/20 border border-red-800/30 rounded-lg p-4">
              <h4 className="text-sm font-bold text-red-400 uppercase mb-2">Critical: Block Fortis on Application Services</h4>
              <p className="text-sm text-gray-300 mb-3">If Fortis wins application services, they're inside with a Hale relationship and a platform to compete at renewal. Cost of inaction is existential.</p>
              <div className="bg-gray-900 border border-gray-800 rounded p-3">
                <div className="text-xs font-bold text-blue-400 uppercase mb-1">Defensive Move</div>
                <p className="text-sm text-gray-300">Propose 90-day Application Discovery (£50-80K) as natural extension of cloud migration. Documents dependencies, rationalisation opportunities. Makes Helios the incumbent expert before Fortis gets a meeting.</p>
              </div>
            </div>
          </Section>

          <Section id="HEALTH" title="Account Health (Simulated Month 6)" subtitle="Earn-the-right assessment">
            <div className="grid grid-cols-2 md:grid-cols-3 gap-3">
              {[{dim:"Delivery Performance",st:"green",d:"97/109 TUPE'd, zero P1"},{dim:"Relationship Quality",st:"green",d:"NPS +38, Whitfield at Q1 QBR"},{dim:"Team Stability",st:"green",d:"Daniel, Rachel, Preet all in-role"},{dim:"Commercial Health",st:"green",d:"Milestones on schedule"},{dim:"Strategic Alignment",st:"amber",d:"In tech room, not Board room yet"},{dim:"Champion Health",st:"green",d:"Jennifer using Rachel's framework at Board"}].map((h,i) => (
                <div key={i} className={`p-3 rounded border ${h.st==="green"?"bg-emerald-950/10 border-emerald-800/30":"bg-amber-950/10 border-amber-800/30"}`}>
                  <div className="flex items-center gap-2 mb-1"><span className={`w-2 h-2 rounded-full ${h.st==="green"?"bg-emerald-500":"bg-amber-400"}`}/><span className="text-xs font-bold text-white uppercase">{h.dim}</span></div>
                  <p className="text-[11px] text-gray-400">{h.d}</p>
                </div>
              ))}
            </div>
          </Section>
        </div>)}

      </div>

      {/* FOOTER */}
      <div className="border-t border-gray-800 px-6 py-3 text-center">
        <span className="text-[10px] text-gray-600 font-mono">GAIN Full Account Plan · Generated from G-01→N-01 intelligence chain · Last compiled: {ACCOUNT.lastUpdated} · GAIN Protocol © David Matthews 2026</span>
      </div>
    </div>
  );
}

ReactDOM.createRoot(document.getElementById('gain-dashboard-root')).render(React.createElement(MeridianDashboard));
</script>
</body>
</html>
