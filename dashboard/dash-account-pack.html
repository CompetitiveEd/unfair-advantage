<style>
  *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

    --accent:#f59e0b; --accent2:#ef4444; --accent3:#3b82f6;
    --green:#10b981; --red:#ef4444; --amber:#f59e0b; --blue:#3b82f6; --purple:#a78bfa;

  body { background:var(--bg); color:var(--text); font-family:var(--font-mono); font-size:13px; min-height:100vh; overflow-x:hidden; }

  .hdr-l { display:flex; flex-direction:column; justify-content:center; gap:8px; padding:22px 32px 22px 40px; border-right:1px solid var(--border); min-width:0; }
  .hdr-label { font-size:9px; letter-spacing:.15em; color:var(--muted); text-transform:uppercase; white-space:nowrap; overflow:hidden; text-overflow:ellipsis; }
  .hdr-title { font-family:'Inter',system-ui,-apple-system,sans-serif; font-size:26px; font-weight:800; color:#fff; line-height:1.1; white-space:nowrap; letter-spacing:-0.5px; }
  .hdr-sub { font-size:11px; color:var(--muted); white-space:nowrap; overflow:hidden; text-overflow:ellipsis; max-width:100%; }
  .hdr-r { display:grid; grid-template-columns:1fr 1fr; }
  .hdr-cell { padding:18px 24px; border-left:1px solid var(--border); border-bottom:1px solid var(--border); display:flex; flex-direction:column; justify-content:center; min-width:150px; }
  .hdr-cell:nth-child(2n+1) { border-left:none; }
  .hdr-cell-label { font-size:9px; letter-spacing:.14em; text-transform:uppercase; color:var(--muted); margin-bottom:5px; }
  .hdr-cell-val { font-family:'Inter',system-ui,-apple-system,sans-serif !important; font-weight:800; line-height:1.1; }
  .hdr-cell-sub { font-size:10px; color:var(--muted); margin-top:4px; }

  .vrd-txt { font-size:12px; color:#cbd5e1; line-height:1.5; }

  .stats { display:grid; grid-template-columns:repeat(auto-fit,minmax(148px,1fr)); gap:1px; margin:20px 40px 0; border:1px solid var(--border); background:var(--border); }
  .stat { background:var(--surface); padding:13px 15px; }
  .stat-l { font-size:9px; letter-spacing:.14em; text-transform:uppercase; color:var(--muted); margin-bottom:4px; }
  .stat-v { font-family:'Inter',system-ui,-apple-system,sans-serif !important; font-size:19px; font-weight:800; color:#fff; }

  .stat-s { font-size:10px; color:var(--muted); margin-top:2px; }

  .tabs { display:flex; margin:26px 40px 0; border-bottom:1px solid var(--border); overflow-x:auto; scrollbar-width:none; }
  .tab { padding:10px 18px; font-size:10px; letter-spacing:.12em; text-transform:uppercase; color:var(--muted); cursor:pointer; border:none; border-bottom:2px solid transparent; white-space:nowrap; transition:all .15s; background:none; font-family:var(--font-mono); }

  .tab.on { color:var(--amber); border-bottom-color:var(--amber); }

  .content { padding:26px 40px 0; }

  .sec { margin-bottom:18px; border:1px solid var(--border); }
  .sec-hd { display:flex; align-items:center; justify-content:space-between; padding:13px 17px; cursor:pointer; background:rgba(255,255,255,.02); user-select:none; }
  .sec-hd:hover { background:rgba(255,255,255,.035); }
  .sec-id { font-size:9px; letter-spacing:.18em; text-transform:uppercase; color:var(--accent3); display:block; margin-bottom:2px; }
  .sec-title { font-family:'Inter',system-ui,-apple-system,sans-serif; font-size:15px; font-weight:700; color:#fff; letter-spacing:-0.2px; }
  .sec-sub { font-size:10px; color:var(--muted); margin-top:1px; display:block; }
  .sec-body { padding:17px; border-top:1px solid var(--border); }
  .tog { font-size:15px; color:var(--muted); transition:.15s; }
  .tog.o { transform:rotate(180deg); }

  table { width:100%; border-collapse:collapse; font-size:11px; }
  th { text-align:left; padding:8px 10px; font-size:9px; letter-spacing:.11em; text-transform:uppercase; color:var(--muted); border-bottom:1px solid var(--border); }
  td { padding:9px 10px; border-bottom:1px solid rgba(255,255,255,.04); vertical-align:top; }
  tr:last-child td { border-bottom:none; }
  tr:hover td { background:rgba(255,255,255,.015); }

  .bdg { display:inline-block; padding:2px 8px; font-size:9px; letter-spacing:.09em; text-transform:uppercase; font-weight:700; border:1px solid; border-radius:2px; }
  .r { color:#fca5a5; border-color:rgba(239,68,68,.4); background:rgba(239,68,68,.1); }
  .a { color:#fcd34d; border-color:rgba(245,158,11,.4); background:rgba(245,158,11,.1); }
  .g { color:#6ee7b7; border-color:rgba(16,185,129,.4); background:rgba(16,185,129,.1); }
  .b { color:#93c5fd; border-color:rgba(59,130,246,.4); background:rgba(59,130,246,.1); }
  .p { color:#c4b5fd; border-color:rgba(167,139,250,.4); background:rgba(167,139,250,.1); }
  .gr { color:#9ca3af; border-color:rgba(156,163,175,.3); background:rgba(156,163,175,.07); }

  .sbar { display:flex; align-items:center; gap:8px; }
  .sbar-t { width:60px; height:5px; background:rgba(255,255,255,.08); border-radius:2px; overflow:hidden; }
  .sbar-f { height:100%; border-radius:2px; }

  .sgrid { display:grid; grid-template-columns:repeat(auto-fill,minmax(310px,1fr)); gap:11px; }
  .sc { border:1px solid var(--border); padding:15px; background:rgba(255,255,255,.02); position:relative; overflow:hidden; }
  .sc::before { content:''; position:absolute; top:0; left:0; right:0; height:2px; }
  .sc.final_authority::before{background:var(--purple);} .sc.primary::before{background:var(--blue);}
  .sc.veto_holder::before{background:var(--red);} .sc.champion::before{background:var(--green);}
  .sc.kingmaker::before{background:var(--amber);} .sc.process_gate::before{background:var(--muted);}

  .sdot { display:inline-block; width:9px; height:9px; border-radius:50%; margin-right:5px; vertical-align:middle; }

  .hier { font-family:var(--font-mono); font-size:11px; color:#94a3b8; background:rgba(0,0,0,.4); border:1px solid var(--border); padding:16px; line-height:2.0; }

  .lk { padding:11px 13px; border:1px solid var(--border); margin-bottom:6px; display:flex; gap:12px; align-items:flex-start; }
  .pm { display:flex; gap:11px; align-items:flex-start; padding:11px 13px; border:1px solid var(--border); margin-bottom:6px; }
  .tl { display:flex; align-items:center; gap:11px; padding:8px 0; }
  .tld { width:10px; height:10px; border-radius:50%; flex-shrink:0; }

  .wt { padding:13px 15px; border:1px solid; margin-bottom:8px; display:flex; align-items:flex-start; gap:12px; }

  .ch2 { display:grid; grid-template-columns:1fr 1fr; gap:11px; }
  .cc { padding:15px; border:1px solid; }

  .exp { display:flex; align-items:center; gap:11px; padding:10px 13px; border:1px solid var(--border); margin-bottom:6px; }
  .eg { width:10px; height:10px; border-radius:50%; flex-shrink:0; }

  .pitch { padding:15px 19px; border-left:3px solid var(--amber); background:rgba(245,158,11,.04); margin-top:12px; }

  .ftr { margin:48px 40px 0; border-top:1px solid var(--border); padding-top:14px; text-align:center; }
  .ftr span { font-size:10px; color:#2d3a4d; }

  @media(max-width:700px){
    .hdr,.content,.stats,.tabs,.vrd,.ftr{padding-left:16px;padding-right:16px;margin-left:0;margin-right:0;}
    .stats{grid-template-columns:1fr 1fr;}
    .sgrid{grid-template-columns:1fr;}
    .ch2{grid-template-columns:1fr;}
    .tabs{margin-left:0;margin-right:0;}
  }
</style>
</head>
