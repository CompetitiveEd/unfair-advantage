<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>The Engine Room | GAIN Protocol</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link href="https://fonts.googleapis.com/css2?family=DM+Sans:wght@400;500;600;700;800;900&family=DM+Mono:wght@400;500&family=Fraunces:wght@700;800;900&display=swap" rel="stylesheet">
<style>
:root{--bg:#07070a;--s1:#0e0e13;--s2:#141419;--s3:#1a1a21;--border:rgba(255,255,255,0.04);--border-h:rgba(255,255,255,0.08);--text:#d4d4d8;--text-dim:#a1a1aa;--text-bright:#fafafa;--blue:#3b82f6;--purple:#a855f7;--amber:#f59e0b;--green:#10b981;--red:#ef4444;--glass:rgba(14,14,19,0.85)}
*,*::before,*::after{margin:0;padding:0;box-sizing:border-box}
body{background:var(--bg);color:var(--text);font-family:'DM Sans',system-ui,sans-serif;-webkit-font-smoothing:antialiased;line-height:1.5;padding:0}

.hero-right .dock-meta {
  display: none;
}

@media (max-width: 900px) {
  .hero-right .dock-card {
    grid-template-columns: 40px 1fr;
  }
}


/* ═══════════════════════════════════════════════
   LINEAR WHEEL — Phase bar + cluster grid
   ═══════════════════════════════════════════════ */

.lw-hub {
  display: flex;
  align-items: center;
  gap: 12px;
  padding: 10px 0;
  margin-bottom: 10px;
}
.lw-hub-dot {
  width: 36px; height: 36px; border-radius: 50%; flex-shrink: 0;
  background: radial-gradient(circle at 35% 35%, #1f1f23, #0a0a0c);
  border: 1.5px solid rgba(239,68,68,0.2);
  display: flex; align-items: center; justify-content: center;
  font-family: 'DM Mono', monospace; font-size: 11px; font-weight: 600;
  color: white; letter-spacing: 1px;
}
.lw-hub-text { font-size: 12px; color: var(--text-dim); }

.lw-phase-bar {
  display: grid;
  grid-template-columns: repeat(5, 1fr);
  gap: 3px;
  position: relative;
}
.lw-phase-bar::before {
  content: '';
  position: absolute; top: 50%; left: 5%; right: 5%;
  height: 2px;
  background: linear-gradient(90deg, var(--blue), var(--purple), var(--amber), var(--green), var(--red));
  opacity: 0.1; z-index: 0;
}

.lw-phase {
  position: relative; z-index: 1;
  display: flex; flex-direction: column; align-items: center;
  padding: 1.25rem 0.5rem;
  cursor: pointer; border-radius: 12px;
  border: 1px solid transparent;
  background: var(--bg);
  transition: all 0.3s cubic-bezier(0.2, 0.9, 0.3, 1);
  -webkit-tap-highlight-color: transparent;
}
.lw-phase:hover, .lw-phase.active {
  border-color: var(--border-h);
  background: var(--s1);
}
.lw-phase[data-phase="g"].active { border-color: rgba(59,130,246,0.2); box-shadow: 0 0 30px rgba(59,130,246,0.06); }
.lw-phase[data-phase="a"].active { border-color: rgba(168,85,247,0.2); box-shadow: 0 0 30px rgba(168,85,247,0.06); }
.lw-phase[data-phase="i"].active { border-color: rgba(245,158,11,0.2); box-shadow: 0 0 30px rgba(245,158,11,0.06); }
.lw-phase[data-phase="n"].active { border-color: rgba(16,185,129,0.2); box-shadow: 0 0 30px rgba(16,185,129,0.06); }
.lw-phase[data-phase="p"].active { border-color: rgba(239,68,68,0.2); box-shadow: 0 0 30px rgba(239,68,68,0.06); }

.lw-letter { font-family:'Fraunces',serif; font-size:32px; font-weight:900; line-height:1; margin-bottom:4px; }
.lw-name { font-size:10px; font-weight:700; letter-spacing:1.5px; text-transform:uppercase; margin-bottom:2px; }
.lw-sub { font-size:10px; color:var(--text-dim); }
.lw-count { font-family:'DM Mono',monospace; font-size:9px; opacity:0.4; margin-top:4px; }

.lw-cluster-tray { min-height: 0; overflow: visible; }

.lw-cluster-grid {
  display: grid;
  grid-template-columns: repeat(auto-fill, minmax(170px, 1fr));
  gap: 8px;
  padding: 12px 0 0;
  opacity: 0; transform: translateY(-8px);
  transition: all 0.3s ease;
}
.lw-cluster-grid.show { opacity: 1; transform: translateY(0); }

.lw-cluster-card {
  background: var(--s1);
  border: 1px solid var(--border);
  border-radius: 10px;
  padding: 12px 14px;
  cursor: pointer;
  transition: all 0.25s;
  position: relative;
}
.lw-cluster-card:hover {
  border-color: var(--border-h);
  background: var(--s2);
  transform: translateY(-2px);
  box-shadow: 0 6px 24px rgba(0,0,0,0.3);
}
.lw-cluster-card::before {
  content: '';
  position: absolute; top: 0; left: 0; right: 0;
  height: 2px; border-radius: 10px 10px 0 0;
  opacity: 0; transition: opacity 0.25s;
}
.lw-cluster-card:hover::before { opacity: 1; }
.lw-cluster-card[data-phase="g"]::before { background: var(--blue); }
.lw-cluster-card[data-phase="a"]::before { background: var(--purple); }
.lw-cluster-card[data-phase="i"]::before { background: var(--amber); }
.lw-cluster-card[data-phase="n"]::before { background: var(--green); }
.lw-cluster-card[data-phase="p"]::before { background: var(--red); }

.lw-cl-head { display: flex; align-items: center; gap: 8px; margin-bottom: 4px; }
.lw-cl-head svg { opacity: 0.5; flex-shrink: 0; }
.lw-cl-name { font-size: 11px; font-weight: 700; letter-spacing: 0.5px; text-transform: uppercase; }
.lw-cl-count { font-family:'DM Mono',monospace; font-size:10px; color:var(--text-dim); }

/* ── Engine panel: inline below cluster grid (not fixed/absolute) ── */
.lw-engine-panel {
  margin-top: 8px;
  padding: 14px 16px;
  border-radius: 12px;
  background: rgba(10,10,14,0.98);
  border: 1px solid rgba(255,255,255,0.08);
  box-shadow: 0 16px 60px rgba(0,0,0,0.8);
  display: none;
}
.lw-engine-panel.show {
  display: block;
  animation: epFadeIn 0.2s ease;
}
@keyframes epFadeIn {
  from { opacity: 0; transform: translateY(-6px); }
  to { opacity: 1; transform: translateY(0); }
}

@media (max-width: 640px) {
  .lw-phase-bar { gap: 2px; }
  .lw-letter { font-size: 24px; }
  .lw-name { font-size: 8px; }
  .lw-sub { display: none; }
  .lw-cluster-grid { grid-template-columns: 1fr 1fr; }
}

@media (max-width: 420px) {
  .lw-phase-bar { grid-template-columns: repeat(5, 1fr); gap: 1px; }
  .lw-letter { font-size: 20px; }
  .lw-name { font-size: 7px; letter-spacing: 0.5px; }
  .lw-count { font-size: 8px; }
  .lw-phase { padding: 1rem 0.25rem; }
}

/* ─── Mobile Wheel Accordion ─── */
.mobile-wheel {
  display: none;
  max-width: 500px;
  margin: 0 auto;
}

@media (max-width: 768px) {
  .mobile-wheel { display: block; }
}

.mw-phase {
  border: 1px solid var(--border);
  border-radius: 12px;
  margin-bottom: 12px;
  overflow: hidden;
  transition: border-color 0.3s;
}
.mw-phase.open { border-color: var(--border-h); }

.mw-phase-header {
  display: flex;
  align-items: center;
  gap: 14px;
  padding: 16px 18px;
  cursor: pointer;
  background: var(--s1);
  -webkit-tap-highlight-color: transparent;
  user-select: none;
  transition: background 0.1s;
}
.mw-phase-header:active { background: rgba(255,255,255,0.03); transform: scale(0.99); }

.mw-letter {
  font-family: 'Fraunces', serif;
  font-size: 28px;
  font-weight: 900;
  width: 44px;
  height: 44px;
  border-radius: 50%;
  display: flex;
  align-items: center;
  justify-content: center;
  border: 2px solid;
  flex-shrink: 0;
}

.mw-phase-info { flex: 1; }
.mw-phase-name {
  font-size: 14px;
  font-weight: 700;
  color: var(--text-bright);
  letter-spacing: 1px;
  text-transform: uppercase;
}
.mw-phase-sub {
  font-size: 11px;
  color: var(--text-dim);
  margin-top: 2px;
}
.mw-phase-count {
  font-family: 'DM Mono', monospace;
  font-size: 11px;
  color: var(--text-dim);
  flex-shrink: 0;
}

.mw-chevron {
  font-size: 16px;
  color: var(--text-dim);
  transition: transform 0.35s cubic-bezier(0.32, 0.72, 0, 1.0);
  flex-shrink: 0;
}
.mw-phase.open .mw-chevron { transform: rotate(180deg); }

.mw-clusters {
  height: 0;
  overflow: hidden;
  background: var(--bg);
  will-change: height;
}

.mw-clusters-inner {
  opacity: 0;
  transform: translateY(-6px);
  transition: opacity 0.25s ease 0.08s, transform 0.3s cubic-bezier(0.2, 0.9, 0.3, 1.02) 0.05s;
}
.mw-phase.open .mw-clusters-inner {
  opacity: 1;
  transform: translateY(0);
}

.mw-cluster {
  border-top: 1px solid var(--border);
}

.mw-cluster-header {
  display: flex;
  align-items: center;
  gap: 10px;
  padding: 14px 18px 14px 28px;
  cursor: pointer;
  -webkit-tap-highlight-color: transparent;
  user-select: none;
  transition: background 0.15s;
}
.mw-cluster-header:active { background: rgba(255,255,255,0.02); }

.mw-cl-icon { font-size: 15px; }
.mw-cl-name {
  font-size: 12px;
  font-weight: 700;
  letter-spacing: 0.5px;
  text-transform: uppercase;
  flex: 1;
}
.mw-cl-count {
  font-family: 'DM Mono', monospace;
  font-size: 10px;
  color: var(--text-dim);
}
.mw-cl-chevron {
  font-size: 12px;
  color: var(--text-dim);
  transition: transform 0.35s cubic-bezier(0.2, 0.9, 0.3, 1.02);
}
.mw-cluster.open .mw-cl-chevron { transform: rotate(180deg); }

.mw-engines {
  height: 0;
  overflow: hidden;
  will-change: height;
}

.mw-engines-inner {
  opacity: 0;
  transform: translateY(-4px);
  transition: opacity 0.2s ease 0.06s, transform 0.25s cubic-bezier(0.2, 0.9, 0.3, 1.02) 0.04s;
}
.mw-cluster.open .mw-engines-inner {
  opacity: 1;
  transform: translateY(0);
}

.mw-engine {
  padding: 12px 18px 12px 46px;
  border-top: 1px solid rgba(255,255,255,0.02);
}
.mw-engine-code {
  font-family: 'DM Mono', monospace;
  font-size: 12px;
  font-weight: 500;
  color: var(--text-bright);
}
.mw-engine-title {
  font-size: 13px;
  font-weight: 600;
  color: var(--text);
  margin-left: 6px;
}
.mw-engine-desc {
  font-size: 11px;
  color: var(--text-dim);
  margin-top: 3px;
  line-height: 1.5;
}

/* ═══════════════════════════════════════════════
   LAUNCHER DOCK — Three cards, click to expand
   ═══════════════════════════════════════════════ */

.dock-section {
  padding: 3rem 2rem;
  border-top: 1px solid var(--border);
}

.dock-grid {
  max-width: 960px;
  margin: 0 auto;
  display: grid;
  grid-template-columns: repeat(3, 1fr);
  gap: 1.25rem;
}

@media (max-width: 768px) {
  .dock-grid { grid-template-columns: 1fr; max-width: 400px; }
}


.eng-title{font-size:11px;font-weight:700;margin-bottom:8px;letter-spacing:0.5px}
.eng-item{font-size:11px;color:var(--text-dim);margin-bottom:6px;line-height:1.5;padding-left:8px;border-left:2px solid var(--border)}
.eng-item strong{color:var(--text-bright);font-weight:700;margin-right:4px}
.eng-item .desc{display:block;font-size:10px;opacity:0.6;margin-top:1px}

</style>

// ── Detect touch device ──
var isTouch = ('ontouchstart' in window) || (navigator.maxTouchPoints > 0);

// ── Linear Wheel Interaction ──
var lwGrid = document.getElementById('lwClusterGrid');
var lwEngPanel = document.getElementById('lwEnginePanel');
var lwActivePhase = null;
var lwActiveCluster = null;

// On desktop: hover opens phase, click toggles
// On touch: tap opens/closes phase (no hover confusion)
document.querySelectorAll('.lw-phase').forEach(function(node) {
  if (!isTouch) {
    node.addEventListener('mouseenter', function() {
      var p = node.dataset.phase;
      if (lwActivePhase === p) return;
      lwSetActive(p);
    });
  }
  node.addEventListener('click', function(e) {
    e.preventDefault();
    var p = node.dataset.phase;
    if (lwActivePhase === p) { lwClearActive(); } else { lwSetActive(p); }
  });
});

function lwSetActive(phase) {
  lwActivePhase = phase;
  lwActiveCluster = null;
  lwEngPanel.classList.remove('show');
  document.querySelectorAll('.lw-phase').forEach(function(n) { n.classList.remove('active'); });
  var el = document.querySelector('.lw-phase[data-phase="' + phase + '"]');
  if (el) el.classList.add('active');

  var d = DATA[phase];
  if (!lwGrid) return;
  lwGrid.classList.remove('show');

  setTimeout(function() {
    lwGrid.innerHTML = '';
    d.clusters.forEach(function(cl, idx) {
      var card = document.createElement('div');
      card.className = 'lw-cluster-card';
      card.dataset.phase = phase;
      card.innerHTML =
        '<div class="lw-cl-head"><span style="color:' + d.color + '">' + cl.icon + '</span>' +
        '<span class="lw-cl-name" style="color:' + d.color + '">' + cl.name + '</span></div>' +
        '<div class="lw-cl-count">' + cl.count + ' engines</div>';

      // Click to show engines inline (works on both touch and desktop)
      card.addEventListener('click', function(e) {
        e.stopPropagation();
        if (lwActiveCluster === cl) {
          lwEngPanel.classList.remove('show');
          lwActiveCluster = null;
        } else {
          lwShowEnginesInline(cl, d.color);
          lwActiveCluster = cl;
        }
      });

      // Desktop hover also works
      if (!isTouch) {
        card.addEventListener('mouseenter', function() {
          lwShowEnginesInline(cl, d.color);
          lwActiveCluster = cl;
        });
      }

      lwGrid.appendChild(card);
    });
    requestAnimationFrame(function() { lwGrid.classList.add('show'); });
  }, 80);
}

function lwClearActive() {
  lwActivePhase = null;
  lwActiveCluster = null;
  document.querySelectorAll('.lw-phase').forEach(function(n) { n.classList.remove('active'); });
  if (lwGrid) lwGrid.classList.remove('show');
  lwEngPanel.classList.remove('show');
  setTimeout(function() { if (lwGrid) lwGrid.innerHTML = ''; }, 300);
}

function lwShowEnginesInline(cl, color) {
  lwEngPanel.classList.remove('show');

  lwEngPanel.innerHTML =
    '<div class="eng-title" style="color:' + color + '">' + cl.icon + ' ' + cl.name + ' \u2014 ' + cl.count + ' Engines</div>' +
    cl.engines.map(function(e) { return '<div class="eng-item"><strong>' + e.c + '</strong> ' + e.t + '<span class="desc">' + e.d + '</span></div>'; }).join('');

  // Show it inline (it's now inside the tray, not fixed-position)
  requestAnimationFrame(function() {
    lwEngPanel.classList.add('show');
  });
}

// ── Click outside to close ──
document.addEventListener('click', function(e) {
  if (!e.target.closest('.lw-phase-bar') && !e.target.closest('.lw-cluster-tray') && !e.target.closest('.lw-engine-panel')) {
    lwClearActive();
  }
});

// ── Scroll reveal fallback for browsers without scroll-driven animations ──
if (!CSS.supports('animation-timeline', 'view()')) {
  const observer = new IntersectionObserver((entries) => {
    entries.forEach(entry => {
      if (entry.isIntersecting) {
        entry.target.classList.add('visible');
      }
    });
  }, { threshold: 0.1 });

  document.querySelectorAll('.reveal').forEach(el => observer.observe(el));
}

// ── Mobile Wheel Accordion (built from same DATA object) ──
const PHASE_META = {
  g: { letter: 'G', name: 'Gather', sub: 'Know Them', count: 22, color: '#3b82f6', light: '#93c5fd' },
  a: { letter: 'A', name: 'Assess', sub: 'Map Them', count: 16, color: '#a855f7', light: '#d8b4fe' },
  i: { letter: 'I', name: 'Influence', sub: 'Win Them', count: 11, color: '#f59e0b', light: '#fcd34d' },
  n: { letter: 'N', name: 'Nurture', sub: 'Grow Them', count: 13, color: '#10b981', light: '#6ee7b7' },
  p: { letter: 'P', name: 'Present', sub: 'Show Them', count: 9, color: '#ef4444', light: '#fca5a5' }
};

function buildMobileWheel() {
  const container = document.getElementById('mobileWheel');
  if (!container) return;

  let html = '';
  for (const [key, phase] of Object.entries(DATA)) {
    const meta = PHASE_META[key];
    html += `<div class="mw-phase" data-mw-phase="${key}">
      <div class="mw-phase-header" onclick="toggleMWPhase(this)">
        <div class="mw-letter" style="color:${meta.light};border-color:${meta.color}30;background:radial-gradient(circle,${meta.color}15,${meta.color}05)">${meta.letter}</div>
        <div class="mw-phase-info">
          <div class="mw-phase-name" style="color:${meta.light}">${meta.name}</div>
          <div class="mw-phase-sub">${meta.sub}</div>
        </div>
        <div class="mw-phase-count">${meta.count} engines</div>
        <div class="mw-chevron">&#x25BE;</div>
      </div>
      <div class="mw-clusters"><div class="mw-clusters-inner">`;

    for (const cl of phase.clusters) {
      html += `<div class="mw-cluster">
        <div class="mw-cluster-header" onclick="toggleMWCluster(this)">
          <span class="mw-cl-icon">${cl.icon}</span>
          <span class="mw-cl-name" style="color:${meta.light}">${cl.name}</span>
          <span class="mw-cl-count">${cl.count}</span>
          <span class="mw-cl-chevron">&#x25BE;</span>
        </div>
        <div class="mw-engines"><div class="mw-engines-inner">`;

      for (const eng of cl.engines) {
        html += `<div class="mw-engine">
          <span class="mw-engine-code" style="color:${meta.light}">${eng.c}</span>
          <span class="mw-engine-title">${eng.t}</span>
          <div class="mw-engine-desc">${eng.d}</div>
        </div>`;
      }

      html += `</div></div></div>`;
    }

    html += `</div></div></div>`;
  }

  container.innerHTML = html;
}

// ── Spring-like height animation using Web Animations API ──
const SPRING_EASE = 'cubic-bezier(0.32, 0.72, 0, 1.0)';

function animateHeight(el, from, to, duration, onDone) {
  const anim = el.animate(
    [{ height: from + 'px' }, { height: to + 'px' }],
    { duration, easing: SPRING_EASE, fill: 'forwards' }
  );
  anim.onfinish = () => {
    el.style.height = to === 0 ? '0px' : 'auto';
    anim.cancel();
    if (onDone) onDone();
  };
}

function toggleMWPhase(header) {
  const phase = header.parentElement;
  const wasOpen = phase.classList.contains('open');
  const clusters = phase.querySelector('.mw-clusters');

  // Close all other phases
  document.querySelectorAll('.mw-phase.open').forEach(p => {
    if (p === phase) return;
    const c = p.querySelector('.mw-clusters');
    const h = c.scrollHeight;
    p.classList.remove('open');
    p.querySelectorAll('.mw-cluster.open').forEach(cl => {
      cl.classList.remove('open');
      cl.querySelector('.mw-engines').style.height = '0px';
    });
    animateHeight(c, h, 0, 280);
  });

  if (wasOpen) {
    const h = clusters.scrollHeight;
    phase.classList.remove('open');
    phase.querySelectorAll('.mw-cluster.open').forEach(cl => {
      cl.classList.remove('open');
      cl.querySelector('.mw-engines').style.height = '0px';
    });
    animateHeight(clusters, h, 0, 250);
  } else {
    phase.classList.add('open');
    clusters.style.height = 'auto';
    const targetH = clusters.scrollHeight;
    clusters.style.height = '0px';
    requestAnimationFrame(() => {
      animateHeight(clusters, 0, targetH, 350);
    });
  }
}

function toggleMWCluster(header) {
  const cluster = header.parentElement;
  const engines = cluster.querySelector('.mw-engines');
  const wasOpen = cluster.classList.contains('open');

  if (wasOpen) {
    const h = engines.scrollHeight;
    cluster.classList.remove('open');
    animateHeight(engines, h, 0, 220);
  } else {
    cluster.classList.add('open');
    engines.style.height = 'auto';
    const targetH = engines.scrollHeight;
    engines.style.height = '0px';
    requestAnimationFrame(() => {
      animateHeight(engines, 0, targetH, 300);
    });

    const parentClusters = cluster.closest('.mw-clusters');
    if (parentClusters && parentClusters.style.height !== 'auto') {
      parentClusters.style.height = 'auto';
    }
  }
}

buildMobileWheel();
