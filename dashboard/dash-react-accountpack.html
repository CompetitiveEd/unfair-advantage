    // RANK & SCORE
    function renderRank(){
        var html='';
        [{k:"COMPANY",l:"Company"},{k:"DEAL",l:"Deal"},{k:"PEOPLE",l:"People"}].forEach(function(lv){
            var lps=P.filter(function(p){return p.l===lv.k});
            html+='<p class="label" style="color:'+LC[lv.k]+';margin:12px 0 6px">'+lv.l+'</p>';
            lps.forEach(function(p){
                html+='<div class="rank-card'+(state.identified[p.c]?' selected':'')+'" data-code="'+p.c+'">';
                html+='<div class="rank-check"></div><div><span style="font-size:13px;font-weight:600;color:white">'+p.n+'</span><br><span style="font-size:11px;color:var(--dim)">'+p.p+'</span></div></div>';
            });
        });
        document.getElementById('disc-rankList').innerHTML=html;
        document.querySelectorAll('.rank-card').forEach(function(c){
            c.addEventListener('click',function(){
                var code=this.getAttribute('data-code');
                var cnt=Object.keys(state.identified).length;
                if(state.identified[code]) delete state.identified[code];
                else if(cnt<3) state.identified[code]=true;
                renderRank();
                if(Object.keys(state.identified).length===3) renderScore();
                else document.getElementById('disc-scorePanel').classList.remove('active');
            });
        });
    }
    function renderScore(){
        var codes=Object.keys(state.identified);
        if(codes.length!==3)return;
        if(!state.scores[codes[0]]){state.scores[codes[0]]=7;state.scores[codes[1]]=3;state.scores[codes[2]]=1}
        var html='<p style="font-size:12px;color:var(--muted);margin-bottom:10px">Scores must add to <strong style="color:white">11</strong>, all different.</p>';
        codes.forEach(function(c){
            var p=P.find(function(x){return x.c===c});
            var v=state.scores[c]||4;
            html+='<div class="score-row"><span class="score-name">'+p.n+'</span>';
            html+='<input type="range" class="score-slider" min="1" max="9" value="'+v+'" data-code="'+c+'">';
            html+='<span class="score-value" id="sv-'+c+'">'+v+'</span></div>';
        });
        html+='<div id="scoreTotal" style="text-align:center;font-size:13px;font-weight:700;margin-top:8px"></div>';
        var sp=document.getElementById('disc-scorePanel');
        sp.innerHTML=html;sp.classList.add('active');
        codes.forEach(function(c){
            var el=sp.querySelector('[data-code="'+c+'"]');
            el.value=state.scores[c];
            document.getElementById('sv-'+c).textContent=state.scores[c];
        });
        updateTotal();
        sp.querySelectorAll('.score-slider').forEach(function(s){
            s.addEventListener('input',function(){
                state.scores[this.getAttribute('data-code')]=parseInt(this.value);
                document.getElementById('sv-'+this.getAttribute('data-code')).textContent=this.value;
                updateTotal();
            });
        });
    }
    function updateTotal(){
        var t=0;for(var k in state.scores)t+=state.scores[k];
        var vals=Object.values(state.scores);var uniq=new Set(vals).size===vals.length;
        var el=document.getElementById('disc-scoreTotal');
        el.innerHTML=t===11&&uniq?'<span style="color:var(--green)">&#10003; Total: 11 — Valid</span>':'<span style="color:var(--red)">&#10007; '+(t!==11?'Total is '+t+', needs 11':'Scores must be different')+'</span>';
    }

    // WHEEL
    function renderWheel(){
        var n=P.length,cx=220,cy=220,r=190;
        var svg='<svg viewBox="0 0 440 440" style="max-width:440px;width:100%">';
        svg+='<circle cx="'+cx+'" cy="'+cy+'" r="'+r+'" fill="none" stroke="var(--border)" stroke-width="1"/>';
        svg+='<circle cx="'+cx+'" cy="'+cy+'" r="35" fill="var(--surface)" stroke="var(--border)"/>';
        svg+='<text x="'+cx+'" y="'+(cy+4)+'" text-anchor="middle" style="font-size:8px;fill:var(--dim);font-weight:600">CLICK TOP</text>';
        for(var i=0;i<n;i++){
            var a1=(i/n)*2*Math.PI-Math.PI/2;
            var a2=((i+1)/n)*2*Math.PI-Math.PI/2;
            var am=((i+0.5)/n)*2*Math.PI-Math.PI/2;
            var x1=cx+r*Math.cos(a1),y1=cy+r*Math.sin(a1);
            var x2=cx+r*Math.cos(a2),y2=cy+r*Math.sin(a2);
            var p=P[i],col=LC[p.l],isTop=state.wheelTop===p.c;
            svg+='<path d="M'+cx+','+cy+' L'+x1+','+y1+' A'+r+','+r+' 0 0,1 '+x2+','+y2+' Z" fill="'+(isTop?col+'20':'transparent')+'" stroke="'+(isTop?col:'var(--border)')+'" stroke-width="'+(isTop?2:0.5)+'" data-code="'+p.c+'" style="cursor:pointer"/>';
            var lr=r*0.75,lx=cx+lr*Math.cos(am),ly=cy+lr*Math.sin(am);
            var short=p.n.length>12?p.n.substring(0,10)+'..':p.n;
            var rot=am*180/Math.PI;if(rot>90&&rot<270)rot+=180;
            svg+='<text x="'+lx+'" y="'+ly+'" transform="rotate('+rot+' '+lx+' '+ly+')" text-anchor="middle" style="font-size:6.5px;font-weight:600;fill:'+(isTop?col:'var(--dim)')+';pointer-events:none">'+short+'</text>';
        }
        svg+='</svg>';
        document.getElementById('disc-wheelContainer').innerHTML=svg;
        document.querySelectorAll('[data-code]').forEach(function(seg){
            if(seg.tagName==='path')seg.addEventListener('click',function(){
                var code=this.getAttribute('data-code');
                state.wheelTop=code;state.identified[code]=true;
                renderWheel();
                var p=P.find(function(x){return x.c===code});
                document.getElementById('disc-wheelTopName').textContent=p.n+' — "'+p.p+'"';
                document.getElementById('disc-wheelDrill').style.display='block';
            });
        });
    }

    // DETECT PROBLEMS FROM TEXT — v2 with hit counting + emotional tone
    var hitCounts = {};
    function detectProblems(text,source){
        var lower=text.toLowerCase();var found=[];
        P.forEach(function(p){
            var hits=0;
            p.k.forEach(function(kw){if(lower.indexOf(kw)>=0) hits++});
            if(hits>0){found.push(p);state.identified[p.c]=true;hitCounts[p.c]=hits}
        });
        // Sort by hit count (most evidence first)
        found.sort(function(a,b){return (hitCounts[b.c]||0)-(hitCounts[a.c]||0)});
        var container=document.getElementById(source+'Detected');
        var pills=document.getElementById(source+'Pills');
        if(found.length>0){
            container.style.display='block';
            pills.innerHTML=found.map(function(p){
                var h=hitCounts[p.c]||1;
                var col=LC[p.l];
                var maxBoxes=5;
                var filled=Math.min(h,maxBoxes);
                var boxes='<span class="sig-boxes">';
                for(var i=0;i<maxBoxes;i++){
                    boxes+='<span class="sig-box'+(i<filled?' filled':'')+'" style="border-color:'+col+'60;'+(i<filled?'background:'+col:'')+'"></span>';
                }
                boxes+='</span>';
                return '<span class="det-pill" style="color:'+col+';border:1px solid '+col+'40;background:'+col+'10">'+p.c+' '+p.n+' '+boxes+'</span>';
            }).join('');
            // Auto-suggest ranking if 4+ problems detected in free talk
            if(source==='talk'&&found.length>=4&&!document.getElementById('disc-rankSuggest')){
                var suggest=document.createElement('div');
                suggest.id='rankSuggest';
                suggest.style.cssText='margin-top:10px;padding:10px 14px;border-radius:8px;border:1px solid rgba(59,130,246,0.3);background:rgba(59,130,246,0.05);font-size:12px;color:#3b82f6';
                suggest.innerHTML='<strong>'+found.length+' problems detected.</strong> Want to force-rank the top 3? <span style="text-decoration:underline;cursor:pointer" onclick="showEntry(\'rank\')">→ Go to Pick & Score</span>';
                container.appendChild(suggest);
            }
        } else { container.style.display='none'; }
    }

    // EMOTIONAL TONE DETECTION — feeds into 00-A for richer context
    var emotionKeywords = {
        FEAR: ["terrified","scared","afraid","nervous","worried","losing my mind","can't sleep","keeps me up","what if","nightmare","dread","screwed","if one walks","not sustainable","dies quietly"],
        ANGER: ["furious","pissed","bullshit","bloody","ridiculous","unacceptable","sick of","fed up","joke","waste of time","incompetent","fucking","same old shit","I'm done","done with this"],
        EXHAUSTION: ["exhausted","tired","burnt out","can't keep","drained","overwhelmed","drowning","too much","not enough hours","breaking point","I'm done","can't keep carrying","not sustainable anymore","carrying everything","still the one"],
        DENIAL: ["not that bad","we're fine","nearly there","just need","it'll come","market conditions","external","to be fair","in all honesty","we're close"],
        URGENCY: ["board","deadline","review","weeks","running out","now or never","last chance","fired","restructure","replace","before Q","kills us","eats the","before the whole"],
        RESIGNATION: ["been saying","nobody listens","raised this","nothing changed","what's the point","tried everything","doesn't matter","turns out","had no power","lost again","after all these years","same way","nothing changes","fizzle out"]
    };
    function detectTone(text){
        var lower=text.toLowerCase();var tones={};
        Object.keys(emotionKeywords).forEach(function(tone){
            var hits=0;
            emotionKeywords[tone].forEach(function(kw){if(lower.indexOf(kw)>=0) hits++});
            if(hits>0) tones[tone]=hits;
        });
        return tones;
    }

                (document.getElementById('disc-storyInput').value+' '+document.getElementById('disc-storyCause').value+' '+document.getElementById('disc-storyEffect').value);

    // DRILL DEEPER
    function renderDrill(){
        var codes=Object.keys(state.identified);
        if(codes.length===0){
            document.getElementById('disc-drillContent').innerHTML='<p style="color:var(--dim)">No problems identified yet. Go back and pick, talk, or tell a story.</p>';return}
        var html='';
        codes.forEach(function(code,idx){
            var p=P.find(function(x){return x.c===code});if(!p)return;
            var drillData=state.drills[code]||{scenario:'',cause:'',effect:'',deeper:''};
            html+='<div class="drill-card">';
            html+='<p class="label" style="color:'+LC[p.l]+';margin-bottom:4px">'+p.l+' — '+p.c+'</p>';
            html+='<h2 style="margin-bottom:12px">'+p.n+'</h2>';

            // Suggested dig-deeper questions
            if(p.dq&&p.dq.length>0){
                html+='<p style="font-size:10px;color:var(--cyan);font-weight:700;letter-spacing:0.1em;text-transform:uppercase;margin-bottom:6px">Suggested Questions</p>';
                p.dq.forEach(function(q){html+='<p style="font-size:12px;color:var(--muted);margin-bottom:4px;padding-left:12px;border-left:2px solid var(--border)">"'+q+'"</p>'});
            }

            html+='<div class="field" style="margin-top:12px"><label>Give me a specific scenario where this happened</label>';
            html+='<textarea rows="2" class="drill-input" data-code="'+code+'" data-field="scenario" placeholder="A specific example...">'+drillData.scenario+'</textarea></div>';

            html+='<div class="field"><label>What caused it? (Their view)</label>';
            html+='<textarea rows="2" class="drill-input" data-code="'+code+'" data-field="cause" placeholder="Root cause...">'+drillData.cause+'</textarea></div>';

            html+='<div class="field"><label>What was the effect? (Business impact)</label>';
            html+='<textarea rows="2" class="drill-input" data-code="'+code+'" data-field="effect" placeholder="Cost, consequence, fallout...">'+drillData.effect+'</textarea></div>';

            html+='<div class="field"><label>And why is THAT a problem? (Ferris wheel — go one level deeper)</label>';
            html+='<textarea rows="2" class="drill-input" data-code="'+code+'" data-field="deeper" placeholder="The problem underneath the problem...">'+drillData.deeper+'</textarea></div>';

            html+='</div>';
        });
        document.getElementById('disc-drillContent').innerHTML=html;
        document.querySelectorAll('.drill-input').forEach(function(el){
            el.addEventListener('input',function(){
                var c=this.getAttribute('data-code'),f=this.getAttribute('data-field');
                if(!state.drills[c])state.drills[c]={scenario:'',cause:'',effect:'',deeper:''};
                state.drills[c][f]=this.value;
            });
        });
    }

    // OUTPUT
    window.generateOutput=function(){
        var ctx={
            company:document.getElementById('disc-ctxCompany').value||'[Company]',
            contact:document.getElementById('disc-ctxContact').value||'[Contact]',
            role:document.getElementById('disc-ctxRole').value||'Unknown',
            deadline:document.getElementById('disc-ctxDeadline').value||'Not specified',
            success:document.getElementById('disc-ctxSuccess').value||'',
            fear:document.getElementById('disc-ctxFear').value||''
        };

        // Gather all text for tone analysis
        var allText='';
        var talk=document.getElementById('disc-talkInput');
        var story=document.getElementById('disc-storyInput');
        var sc=document.getElementById('disc-storyCause'),se=document.getElementById('disc-storyEffect');
        if(talk&&talk.value) allText+=talk.value+' ';
        if(story&&story.value) allText+=story.value+' ';
        if(sc&&sc.value) allText+=sc.value+' ';
        if(se&&se.value) allText+=se.value+' ';
        if(ctx.success) allText+=ctx.success+' ';
        if(ctx.fear) allText+=ctx.fear+' ';

        var tones=detectTone(allText);
        var codes=Object.keys(state.identified);

        // Sort by hit count for TL;DR
        var ranked=codes.slice().sort(function(a,b){return (hitCounts[b]||0)-(hitCounts[a]||0)});
        var top3=ranked.slice(0,3).map(function(c){var p=P.find(function(x){return x.c===c});return p?p.n:'';});

        // Confidence score
        var totalHits=0;codes.forEach(function(c){totalHits+=(hitCounts[c]||1)});
        var confidence=codes.length>=8?'HIGH':codes.length>=5?'MEDIUM':'LOW';
        if(totalHits>15) confidence='HIGH';

        // Build output
        var out='GAIN-00 DISCOVERY SESSION OUTPUT\n';
        out+='Ready for 00-A INTAKE processing\n';
        out+='================================\n\n';

        // TL;DR
        out+='TL;DR\n';
        out+='---\n';
        out+='Top detected: '+top3.join(', ')+'\n';
        out+='Problems found: '+codes.length+'/24\n';
        out+='Detection confidence: '+confidence+' ('+totalHits+' keyword signals across '+codes.length+' problems)\n';
        if(Object.keys(tones).length>0){
            var toneList=Object.keys(tones).sort(function(a,b){return tones[b]-tones[a]});
            out+='Emotional tone: '+toneList.join(' + ')+'\n';
            out+='Dominant: '+toneList[0]+' ('+tones[toneList[0]]+' signal'+(tones[toneList[0]]>1?'s':'')+')\n';
        }
        out+='---\n\n';

        // Solvable gate — before the full output
        var companyCount=0,dealCount=0,peopleCount=0;
        ranked.forEach(function(c){
            var p=P.find(function(x){return x.c===c});
            if(p.l==='COMPANY')companyCount++;
            if(p.l==='DEAL')dealCount++;
            if(p.l==='PEOPLE')peopleCount++;
        });
        var solvable='YES';var solvableNote='';
        if(codes.length>=15) {solvable='CONDITIONAL';solvableNote='Extensive intervention required — 15+ problems detected. Prioritise top 5 before full chain.';}
        else if(companyCount>=5&&peopleCount>=5) {solvable='CONDITIONAL';solvableNote='Deep structural + behavioural issues. Fix people problems first or company-level fixes won\'t stick.';}
        else if(codes.length<=3&&totalHits<6) {solvable='YES — QUICK WIN';solvableNote='Focused problem set. Targeted GAIN prompts can address this in days, not weeks.';}
        else {solvable='YES';solvableNote='Clear structural and/or behavioural drivers identified. GAIN prompt chain addresses all detected problems.';}

        out+='SOLVABLE WITH GAIN: '+solvable+'\n';
        out+=solvableNote+'\n';
        out+='Problem spread: '+companyCount+' Company · '+dealCount+' Deal · '+peopleCount+' People\n\n';

        out+='COMPANY: '+ctx.company+'\n';
        out+='CONTACT: '+ctx.contact+' ('+ctx.role+')\n';
        out+='DEADLINE: '+ctx.deadline+'\n';
        out+='DATE: '+new Date().toLocaleDateString('en-GB')+'\n\n';

        if(ctx.success) out+='SUCCESS VISION (their words): "'+ctx.success+'"\n';
        if(ctx.fear) out+='BIGGEST FEAR (their words): "'+ctx.fear+'"\n';
        out+='\n';

        // Identified problems — sorted by evidence strength with signal boxes
        out+='PROBLEMS IDENTIFIED: '+codes.length+'\n';
        out+='---\n';
        ranked.forEach(function(c){
            var p=P.find(function(x){return x.c===c});if(!p)return;
            var h=hitCounts[c]||1;
            var maxB=5;var filled=Math.min(h,maxB);
            var boxes='';
            for(var i=0;i<maxB;i++) boxes+=(i<filled?'■':'□');
            var severity=h>=4?'CRITICAL':h>=2?'AT RISK':'WATCH';
            out+=boxes+' '+p.c+' '+p.n+' ['+p.l+'] — '+severity+' ('+h+' signal'+(h>1?'s':'')+')';
            if(state.scores[c]) out+=' — Score: '+state.scores[c]+'/11';
            if(c===state.wheelTop) out+=' — TOP OF WHEEL';
            out+='\n';
        });
        out+='\n';

        // Scores
        if(Object.keys(state.scores).length>0){
            out+='FORCED RANKING (scores to 11):\n';
            var sorted=Object.entries(state.scores).sort(function(a,b){return b[1]-a[1]});
            sorted.forEach(function(e){
                var p=P.find(function(x){return x.c===e[0]});
                out+='  '+e[1]+'/11 — '+p.n+'\n';
            });
            out+='\n';
        }

        // Wheel drill
        if(state.wheelTop){
            var w1=document.getElementById('disc-wheelWhy1'),w2=document.getElementById('disc-wheelWhy2'),w3=document.getElementById('disc-wheelWhy3');
            if(w1&&w1.value){
                out+='FERRIS WHEEL DRILL:\n';
                out+='Why at the top: "'+w1.value+'"\n';
                if(w2&&w2.value) out+='Why is THAT a problem: "'+w2.value+'"\n';
                if(w3&&w3.value) out+='90-day consequence: "'+w3.value+'"\n';
                out+='\n';
            }
        }

        // Free talk
        if(talk&&talk.value.trim()){
            out+='FREE TALK TRANSCRIPT:\n';
            out+='---\n'+talk.value.trim()+'\n---\n\n';
        }

        // War story
        if(story&&story.value.trim()){
            out+='WAR STORY:\n';
            out+='---\n'+story.value.trim()+'\n---\n';
            if(sc&&sc.value) out+='CAUSE: '+sc.value+'\n';
            if(se&&se.value) out+='EFFECT: '+se.value+'\n';
            out+='\n';
        }

        // Drill deeper
        var drillCodes=Object.keys(state.drills);
        if(drillCodes.length>0){
            out+='DRILL DEEPER RESPONSES:\n';
            drillCodes.forEach(function(c){
                var p=P.find(function(x){return x.c===c});var d=state.drills[c];
                if(!d.scenario&&!d.cause&&!d.effect&&!d.deeper)return;
                out+='\n'+p.c+' '+p.n+':\n';
                if(d.scenario) out+='  Scenario: "'+d.scenario+'"\n';
                if(d.cause) out+='  Cause: "'+d.cause+'"\n';
                if(d.effect) out+='  Effect: "'+d.effect+'"\n';
                if(d.deeper) out+='  Deeper: "'+d.deeper+'"\n';
            });
            out+='\n';
        }

        // Emotional tone detail
        if(Object.keys(tones).length>0){
            out+='EMOTIONAL TONE ANALYSIS:\n';
            out+='---\n';
            Object.keys(tones).sort(function(a,b){return tones[b]-tones[a]}).forEach(function(t){
                out+=t+': '+tones[t]+' signal'+(tones[t]>1?'s':'')+'\n';
            });
            out+='---\n';
            out+='Note: Tone data helps 00-A calibrate the diagnostic. A FEARFUL contact will understate problems. An ANGRY contact will overstate them. A DENIAL contact will deflect to externals. Adjust evidence weighting accordingly.\n\n';
        }

        // Smart prompt routing — immediate actions, not a shopping list
        // Map each problem to its FIRST prompt (the one that digs deeper)
        var firstPrompt={
            '1.1':['G-02','Financial Forensics','Find where margin is actually leaking'],
            '1.2':['G-01','Macro Intel','Map what was acquired and where the overlaps are'],
            '1.3':['G-03','Executive Profiles','Profile the heroes — who stays, who walks, why'],
            '1.4':['G-01','Macro Intel','Define who you actually win with'],
            '1.5':['G-02','Financial Forensics','Get the real numbers — what do you actually measure?'],
            '1.6':['G-02','Financial Forensics','Quantify the rebate dependency'],
            '1.7':['G-19','Narrative Gap','Map what they say vs what they actually do'],
            '2.1':['G-03','Executive Profiles','Decode what the buyer is really saying'],
            '2.2':['G-02','Financial Forensics','Audit the pipeline against real revenue data'],
            '2.3':['A-04','Motivation Map','Find the urgency lever — why would they act now?'],
            '2.4':['A-05','Authority Map','Map who really decides'],
            '2.5':['G-05','First 15 Minutes','Restructure the opening — stop pitching, start asking'],
            '2.6':['A-06','Deal Strategy','Identify what is actually blocking the deal'],
            '2.7':['I-03','Competitor Kill Shot','Decode the competitor strategy you can\'t see'],
            '2.8':['A-05','Authority Map','Verify whether your champion has real power'],
            '2.9':['I-01','Pre-Mortem','Model the dead deal honestly — kill or revive?'],
            '2.10':['I-01B','Lose Theme Architect','Find the patterns across your losses'],
            '3.1':['G-03','Executive Profiles','Profile the flight risks and what keeps them'],
            '3.2':['A-12','Psych Driver','Understand why training doesn\'t stick'],
            '3.3':['A-09','Commercial Shield','Build the accountability framework that\'s missing'],
            '3.4':['G-10','Hiring Signals','Decode what you actually need vs what you keep hiring'],
            '3.5':['A-12','Psych Driver','Assess whether managers can actually manage'],
            '3.6':['A-10','Lever Engine','Redesign the comp structure driving wrong behaviour'],
            '3.7':['A-04','Motivation Map','Map what the pressure is actually creating'],
            '3.8':['A-04','Motivation Map','Decode what\'s driving the fear']
        };

        // Get top 5 problems (highest signal count)
        var top5=ranked.slice(0,5);
        // Get the immediate prompts for top 5 (deduplicated)
        var immediatePrompts={};
        var immediateList=[];
        top5.forEach(function(c){
            var fp=firstPrompt[c];
            if(fp&&!immediatePrompts[fp[0]]){
                immediatePrompts[fp[0]]=true;
                immediateList.push({code:c,prompt:fp[0],name:fp[1],why:fp[2]});
            }
        });

        // After-meeting prompts: next layer for top 5
        var afterMap={
            '1.1':'A-09 Commercial Shield — protect margin going forward',
            '1.2':'G-15 Cross-Reference — find what they claim vs what\'s real',
            '1.3':'A-04 Motivation Map — what keeps them vs what loses them',
            '1.4':'A-06 Deal Strategy — focus the pipeline on ICP',
            '1.5':'A-10 Lever Engine — redesign what gets measured',
            '1.6':'A-09 Commercial Shield — build rebate-independent margin',
            '1.7':'I-08 Commercial Narrative — rebuild the story',
            '2.1':'A-13 HUMINT Elicitation — questions that cut through happy ears',
            '2.2':'A-06 Deal Strategy — qualify properly, kill what\'s dead',
            '2.3':'G-08 Budget Cycle — find the compelled event',
            '2.4':'A-14 Cross-Stakeholder Dynamics — map alliances and rivalries',
            '2.5':'A-04 Motivation Map — understand what to ask about',
            '2.6':'A-08 Logic Engine — map decision complexity',
            '2.7':'G-04 Battle Card — build competitive ammunition',
            '2.8':'G-03 Executive Profiles — profile the champion deeply',
            '2.9':'A-06 Deal Strategy — kill or revive decision framework',
            '2.10':'I-04 Evaluation Scoring — understand why you lost on criteria',
            '3.1':'A-16 TUPE Map — map the people risk properly',
            '3.2':'A-11 Engagement Plans — personalised reinforcement plan',
            '3.3':'A-10 Lever Engine — metrics that force quality',
            '3.4':'A-15 Culture Alignment — are you hiring for the wrong culture?',
            '3.5':'A-11 Engagement Plans — manager development plans',
            '3.6':'A-09 Commercial Shield — align incentives to outcomes',
            '3.7':'N-00 Warning Brief — flag the risk to leadership',
            '3.8':'A-09 Commercial Shield — remove the need to discount'
        };

        out+='WHAT TO DO NEXT\n';
        out+='===============\n\n';

        out+='IMMEDIATE — Run these before the first proper meeting:\n';
        out+='---\n';
        immediateList.forEach(function(item,idx){
            out+=(idx+1)+'. '+item.prompt+' '+item.name+'\n';
            out+='   Why: '+item.why+'\n';
            out+='   Triggered by: '+item.code+' ('+P.find(function(x){return x.c===item.code}).n+')\n';
        });
        out+='\n';

        out+='AFTER FIRST MEETING — Deepen the diagnosis:\n';
        out+='---\n';
        top5.forEach(function(c){
            if(afterMap[c]){
                out+=c+' → '+afterMap[c]+'\n';
            }
        });
        out+='\n';

        out+='THEN — Feed everything into 00-A INTAKE and run the full diagnostic chain.\n';
        out+='00-D PRESCRIPTION will map the remaining prompts based on what the chain finds.\n';
        out+='Full library available: G-series (20) · A-series (16) · I-series (12) · N-series (12) = 60 prompts\n\n';

        out+='================================\n';
        out+='PASTE THE ABOVE INTO GAIN 00-A INTAKE.\n';
        out+='The diagnostic chain handles the rest.\n';

        document.getElementById('disc-outputContent').textContent=out;
        discGoPhase('output');
    };

    window.copyOutput=function(){
        var text=document.getElementById('disc-outputContent').textContent;
        navigator.clipboard.writeText(text).then(function(){
            var btn=document.getElementById('disc-copyBtn');
            btn.textContent='Copied!';btn.classList.add('copied');
            setTimeout(function(){btn.textContent='Copy to Clipboard';btn.classList.remove('copied')},2000);
        });
    };
})();


// ─── Show / hide helpers called by index.html buttons ───
window.showFullSession = function() {
  // Hide index.html rapid test
  var demo = document.getElementById('discoveryDemo');
  var out  = document.getElementById('discOutput');
  if(demo) demo.style.display = 'none';
  if(out)  out.style.display  = 'none';

  // Show full session container
  var full = document.getElementById('discFullSession');
  if(full) {
    full.style.display = 'block';
    // Hide the discovery's own internal rapid test panel
    var innerDemo = document.getElementById('disc-demoPanel');
    if(innerDemo) innerDemo.style.display = 'none';
    // Show the phase nav
    var nav = document.getElementById('disc-phaseNav');
    if(nav) nav.style.display = 'flex';
    // Activate context phase
    if(typeof discGoPhase === 'function') discGoPhase('context');
    full.scrollIntoView({behavior:'smooth', block:'start'});
  }
};
window.hideFullSession = function() {
  // Hide full session
  var full = document.getElementById('discFullSession');
  if(full) full.style.display = 'none';
  // Restore inner demoPanel for next time
  var innerDemo = document.getElementById('disc-demoPanel');
  if(innerDemo) innerDemo.style.display = 'block';
  var nav = document.getElementById('disc-phaseNav');
  if(nav) nav.style.display = 'none';
  // Restore index.html rapid test
  var demo = document.getElementById('discoveryDemo');
  if(demo) {
    demo.style.display = 'block';
    demo.scrollIntoView({behavior:'smooth', block:'nearest'});
  }
};
})();
</script>
<script>
// ── Radial nav menus — close on outside click and scroll ──
document.addEventListener('click', function(e) {
  document.querySelectorAll('.radial-toggle').forEach(function(toggle) {
    if (toggle.checked && !e.target.closest('.radial-menu')) toggle.checked = false;
  });
});
document.addEventListener('scroll', function() {
  document.querySelectorAll('.radial-toggle').forEach(function(toggle) {
    if (toggle.checked) toggle.checked = false;
  });
});
document.querySelectorAll('.radial-toggle').forEach(function(toggle) {
  toggle.addEventListener('change', function() {
    if (this.checked) {
      var self = this;
      document.querySelectorAll('.radial-toggle').forEach(function(other) {
        if (other !== self) other.checked = false;
      });
    }
  });
});
</script>
